<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FantasyNG — Reset Password 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--red-primary:#C8102E;--pink-hot:#FF006E;--bg-secondary:#FFF0F5;--text-primary:#1A0010;--text-muted:#8C5A6A;--border-color:#F0C0D0;--gradient-btn:linear-gradient(135deg,#C8102E 0%,#FF006E 100%);--gradient-hero:linear-gradient(135deg,#1A0010 0%,#3D0020 40%,#6B0030 100%);--font-display:'Cinzel',serif;--font-body:'DM Sans',sans-serif;--radius-md:14px;--radius-pill:999px;--transition:0.25s ease;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-body);background:var(--gradient-hero);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.card{background:#fff;border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.logo{text-align:center;margin-bottom:1.5rem;}
.logo h1{font-family:var(--font-display);font-size:1.8rem;color:var(--red-primary);letter-spacing:2px;}
.logo p{color:var(--text-muted);font-size:0.95rem;margin-top:0.3rem;}
.step{display:none;}.step.active{display:block;}
.form-group{margin-bottom:1.2rem;}
.form-group label{display:block;font-weight:600;font-size:0.85rem;color:var(--text-primary);margin-bottom:0.4rem;}
.form-group input{width:100%;padding:0.85rem 1rem;border:2px solid var(--border-color);border-radius:var(--radius-md);font-family:var(--font-body);font-size:0.95rem;color:var(--text-primary);background:var(--bg-secondary);outline:none;transition:border var(--transition);}
.form-group input:focus{border-color:var(--red-primary);}
.btn{width:100%;padding:1rem;border:none;border-radius:var(--radius-pill);background:var(--gradient-btn);color:#fff;font-family:var(--font-body);font-size:1rem;font-weight:700;cursor:pointer;transition:all var(--transition);margin-top:0.5rem;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(200,16,46,0.4);}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.msg{padding:0.7rem 1rem;border-radius:10px;font-size:0.88rem;margin-bottom:1rem;display:none;}
.msg.error{background:#FFF0F0;border:1px solid #FFB0B0;color:#C00;}
.msg.success{background:#F0FFF0;border:1px solid #90EE90;color:#006600;}
.links{text-align:center;margin-top:1.2rem;font-size:0.9rem;color:var(--text-muted);}
.links a{color:var(--red-primary);font-weight:600;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:0.4rem;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><h1>FantasyNG</h1><p>Reset Your Password 🔐</p></div>

  <!-- Step 1: Enter email/phone -->
  <div class="step active" id="step1">
    <div class="msg" id="msg1"></div>
    <div class="form-group"><label>Email or Phone Number</label><input type="text" id="emailOrPhone" placeholder="Enter your email or phone"/></div>
    <button class="btn" id="btn1" onclick="requestOTP()">Send OTP</button>
    <div class="links"><a href="login.html">← Back to Login</a></div>
  </div>

  <!-- Step 2: Enter OTP + new password -->
  <div class="step" id="step2">
    <div class="msg" id="msg2"></div>
    <div class="form-group"><label>OTP Code</label><input type="text" id="otp" placeholder="Enter 6-digit OTP"/></div>
    <div class="form-group"><label>New Password</label><input type="password" id="newPassword" placeholder="Min 6 characters"/></div>
    <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmNew" placeholder="Repeat new password"/></div>
    <button class="btn" id="btn2" onclick="resetPassword()">Reset Password</button>
  </div>
</div>

<script>
const API = 'https://fantasyng-backend-1.onrender.com';
let savedEmailOrPhone = '';

async function requestOTP() {
  const btn = document.getElementById('btn1');
  const msg = document.getElementById('msg1');
  const emailOrPhone = document.getElementById('emailOrPhone').value.trim();
  if (!emailOrPhone) { showMsg('msg1', 'Please enter your email or phone.', 'error'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending...';
  try {
    const res = await fetch(API + '/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emailOrPhone })
    });
    const data = await res.json();
    savedEmailOrPhone = emailOrPhone;
    showMsg('msg1', 'OTP sent! Check your email or ask admin for the OTP.', 'success');
    setTimeout(() => {
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
    }, 1500);
  } catch (e) { showMsg('msg1', 'Network error. Please try again.', 'error'); }
  btn.disabled = false;
  btn.textContent = 'Send OTP';
}

async function resetPassword() {
  const btn = document.getElementById('btn2');
  const otp = document.getElementById('otp').value.trim();
  const newPassword = document.getElementById('newPassword').value;
  const confirmNew = document.getElementById('confirmNew').value;
  if (!otp || !newPassword) { showMsg('msg2', 'Please fill all fields.', 'error'); return; }
  if (newPassword !== confirmNew) { showMsg('msg2', 'Passwords do not match.', 'error'); return; }
  if (newPassword.length < 6) { showMsg('msg2', 'Password must be at least 6 characters.', 'error'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Resetting...';
  try {
    const res = await fetch(API + '/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emailOrPhone: savedEmailOrPhone, otp, newPassword })
    });
    const data = await res.json();
    if (data.success) {
      showMsg('msg2', '✅ Password reset! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } else { showMsg('msg2', data.message || 'Reset failed. Check your OTP.', 'error'); }
  } catch (e) { showMsg('msg2', 'Network error. Please try again.', 'error'); }
  btn.disabled = false;
  btn.textContent = 'Reset Password';
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}
</script>
</body>
</html>
