<!DOCTYPE html>
<html lang="en">
<head>
<!--
  FantasyNG — signup.html
  Nigeria's Premier Linkup Platform (18+)
  ⚡ EXECUTED BY XCLUSIVE ⚡
-->
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FantasyNG — Sign Up 🔥</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --red-primary:#C8102E;--pink-hot:#FF006E;--gold:#FFD700;
  --bg-secondary:#FFF0F5;--text-primary:#1A0010;--text-muted:#8C5A6A;
  --border-color:#F0C0D0;--gradient-btn:linear-gradient(135deg,#C8102E 0%,#FF006E 100%);
  --gradient-hero:linear-gradient(135deg,#1A0010 0%,#3D0020 40%,#6B0030 100%);
  --font-display:'Cinzel',serif;--font-serif:'Cormorant Garamond',serif;--font-body:'DM Sans',sans-serif;
  --radius-md:14px;--radius-pill:999px;--transition:0.25s ease;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-body);background:var(--gradient-hero);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.card{background:#fff;border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.logo{text-align:center;margin-bottom:1.5rem;}
.logo h1{font-family:var(--font-display);font-size:1.8rem;color:var(--red-primary);letter-spacing:2px;}
.logo p{font-family:var(--font-serif);color:var(--text-muted);font-size:0.95rem;margin-top:0.3rem;}
.form-group{margin-bottom:1.1rem;}
.form-group label{display:block;font-weight:600;font-size:0.85rem;color:var(--text-primary);margin-bottom:0.4rem;}
.form-group input,.form-group select{width:100%;padding:0.85rem 1rem;border:2px solid var(--border-color);border-radius:var(--radius-md);font-family:var(--font-body);font-size:0.95rem;color:var(--text-primary);background:var(--bg-secondary);outline:none;transition:border var(--transition);}
.form-group input:focus,.form-group select:focus{border-color:var(--red-primary);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.btn{width:100%;padding:1rem;border:none;border-radius:var(--radius-pill);background:var(--gradient-btn);color:#fff;font-family:var(--font-body);font-size:1rem;font-weight:700;cursor:pointer;transition:all var(--transition);margin-top:0.5rem;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(200,16,46,0.4);}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.error-msg{background:#FFF0F0;border:1px solid #FFB0B0;color:#C00;padding:0.7rem 1rem;border-radius:10px;font-size:0.88rem;margin-bottom:1rem;display:none;}
.success-msg{background:#F0FFF0;border:1px solid #90EE90;color:#006600;padding:0.7rem 1rem;border-radius:10px;font-size:0.88rem;margin-bottom:1rem;display:none;}
.links{text-align:center;margin-top:1.2rem;font-size:0.9rem;color:var(--text-muted);}
.links a{color:var(--red-primary);font-weight:600;}
.age-notice{background:#FFF8E1;border:1px solid #FFD700;color:#7A5500;padding:0.6rem 1rem;border-radius:10px;font-size:0.82rem;margin-bottom:1rem;text-align:center;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:0.4rem;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>FantasyNG</h1>
    <p>Create Your Account 🔥 Adults 18+ Only</p>
  </div>
  <div class="age-notice">⚠️ You must be 18 or older to join FantasyNG</div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Choose a unique username"/>
  </div>
  <div class="grid-2">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="08012345678"/>
    </div>
  </div>
  <div class="grid-2">
    <div class="form-group">
      <label>Gender</label>
      <select id="gender">
        <option value="">Select gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>
    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date" id="dateOfBirth"/>
    </div>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 6 characters"/>
  </div>
  <div class="form-group">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat password"/>
  </div>
  <button class="btn" id="signupBtn" onclick="signup()">Create Account — It's Free!</button>
  <div class="links">
    Already have an account? <a href="login.html">Login</a>
  </div>
  <div class="links" style="margin-top:0.5rem;">
    <a href="index.html">← Back to Home</a>
  </div>
</div>
<script>
const API = 'https://fantasyng-backend-1.onrender.com';

async function signup() {
  const btn = document.getElementById('signupBtn');
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');

  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const gender = document.getElementById('gender').value;
  const dateOfBirth = document.getElementById('dateOfBirth').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (!username || !email || !phone || !gender || !dateOfBirth || !password) {
    showError('Please fill in all fields.'); return;
  }
  if (password !== confirmPassword) { showError('Passwords do not match.'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

  // Age check
  const dob = new Date(dateOfBirth);
  const today = new Date();
  let age = today.getFullYear() - dob.getFullYear();
  const m = today.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
  if (age < 18) { showError('You must be 18 or older to join FantasyNG.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account...';

  try {
    const res = await fetch(API + '/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, phone, password, gender, dateOfBirth })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('fng_token', data.token);
      localStorage.setItem('fng_user', JSON.stringify(data.user));
      successMsg.textContent = 'Account created! Redirecting...';
      successMsg.style.display = 'block';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    } else {
      showError(data.message || 'Sign up failed. Please try again.');
    }
  } catch (e) {
    showError('Network error. Please check your connection.');
  }
  btn.disabled = false;
  btn.innerHTML = 'Create Account — It\'s Free!';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
