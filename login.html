<!DOCTYPE html>
<html lang="en">
<head>
<!--
  FantasyNG — login.html
  Nigeria's Premier Linkup Platform (18+)
  ⚡ EXECUTED BY XCLUSIVE ⚡
-->
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FantasyNG — Login 🔥</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --red-primary:#C8102E;--pink-hot:#FF006E;--gold:#FFD700;
  --bg-primary:#FFFFFF;--bg-secondary:#FFF0F5;
  --text-primary:#1A0010;--text-muted:#8C5A6A;
  --border-color:#F0C0D0;--shadow-md:0 4px 20px rgba(200,16,46,0.12);
  --gradient-btn:linear-gradient(135deg,#C8102E 0%,#FF006E 100%);
  --gradient-hero:linear-gradient(135deg,#1A0010 0%,#3D0020 40%,#6B0030 100%);
  --font-display:'Cinzel',serif;--font-serif:'Cormorant Garamond',serif;--font-body:'DM Sans',sans-serif;
  --radius-md:14px;--radius-pill:999px;--transition:0.25s ease;
}
body.night-mode{--bg-primary:#0D0007;--bg-secondary:#160010;--text-primary:#FFF0F5;--text-muted:#CC7090;--border-color:#3D0025;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-body);background:var(--gradient-hero);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.card{background:#fff;border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.logo{text-align:center;margin-bottom:1.5rem;}
.logo h1{font-family:var(--font-display);font-size:1.8rem;color:var(--red-primary);letter-spacing:2px;}
.logo p{font-family:var(--font-serif);color:var(--text-muted);font-size:0.95rem;margin-top:0.3rem;}
.form-group{margin-bottom:1.2rem;}
.form-group label{display:block;font-weight:600;font-size:0.85rem;color:var(--text-primary);margin-bottom:0.4rem;}
.form-group input{width:100%;padding:0.85rem 1rem;border:2px solid var(--border-color);border-radius:var(--radius-md);font-family:var(--font-body);font-size:0.95rem;color:var(--text-primary);background:var(--bg-secondary);outline:none;transition:border var(--transition);}
.form-group input:focus{border-color:var(--red-primary);}
.btn{width:100%;padding:1rem;border:none;border-radius:var(--radius-pill);background:var(--gradient-btn);color:#fff;font-family:var(--font-body);font-size:1rem;font-weight:700;cursor:pointer;transition:all var(--transition);margin-top:0.5rem;letter-spacing:0.5px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(200,16,46,0.4);}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.error-msg{background:#FFF0F0;border:1px solid #FFB0B0;color:#C00;padding:0.7rem 1rem;border-radius:10px;font-size:0.88rem;margin-bottom:1rem;display:none;}
.links{text-align:center;margin-top:1.2rem;font-size:0.9rem;color:var(--text-muted);}
.links a{color:var(--red-primary);font-weight:600;}
.divider{text-align:center;margin:1rem 0;color:var(--text-muted);font-size:0.85rem;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border-color);}
.divider::before{left:0;}.divider::after{right:0;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:0.4rem;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>FantasyNG</h1>
    <p>Where Fantasy Becomes Reality 🔥</p>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="form-group">
    <label>Email or Phone Number</label>
    <input type="text" id="emailOrPhone" placeholder="Enter email or phone"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password"/>
  </div>
  <button class="btn" id="loginBtn" onclick="login()">Login</button>
  <div class="links">
    <a href="forgot-password.html">Forgot Password?</a>
  </div>
  <div class="divider">or</div>
  <div class="links">
    Don't have an account? <a href="signup.html">Sign Up Free</a>
  </div>
  <div class="links" style="margin-top:0.5rem;">
    <a href="index.html">← Back to Home</a>
  </div>
</div>
<script>
const API = 'https://fantasyng-backend-1.onrender.com';

async function login() {
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  const emailOrPhone = document.getElementById('emailOrPhone').value.trim();
  const password = document.getElementById('password').value;

  errorMsg.style.display = 'none';
  if (!emailOrPhone || !password) { showError('Please fill in all fields.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Logging in...';

  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emailOrPhone, password })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('fng_token', data.token);
      localStorage.setItem('fng_user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } else {
      showError(data.message || 'Login failed. Please try again.');
    }
  } catch (e) {
    showError('Network error. Please check your connection.');
  }
  btn.disabled = false;
  btn.innerHTML = 'Login';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
</body>
</html>
